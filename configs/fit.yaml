# ============================================================
# configs/fit.yaml — Configuración de ENTRENAMIENTO
#
# Uso:
#   python main.py fit --config configs/fit.yaml
# ============================================================

seed_everything: 42

# ----------------------------------------------------------
# Trainer
# ----------------------------------------------------------
trainer:
  max_epochs: 10
  accelerator: auto       # "cpu" | "gpu" | "mps" | "auto"
  devices: auto
  precision: "32-true"    # "16-mixed" para AMP en GPU

  logger:
    class_path: lightning.pytorch.loggers.TensorBoardLogger
    init_args:
      save_dir: runs
      name: dogcat         # logs en runs/dogcat/version_N/
      version: null        # null → auto-incremento (version_0, version_1, …)

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val/acc
        mode: max
        save_top_k: 1
        dirpath: models/
        filename: best_model   # guarda models/best_model.ckpt
        verbose: true

    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val/loss
        patience: 4
        mode: min
        verbose: true

    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch

# ----------------------------------------------------------
# Modelo
# ----------------------------------------------------------
model:
  num_classes: 2
  lr: 0.001
  momentum: 0.9
  backbone: simplecnn     # "simplecnn" | "resnet18"
  pretrained: true        # solo aplica si backbone=resnet18
  img_size: 64            # debe coincidir con data.img_size

# ----------------------------------------------------------
# Datos
# ----------------------------------------------------------
data:
  data_dir: data
  batch_size: 32
  img_size: 64
  train_ratio: 0.70       # 70 % entrenamiento
  val_ratio: 0.15         # 15 % validación  → 15 % test implícito
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]
  num_workers: 4
